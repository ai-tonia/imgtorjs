<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>e2e save</title>
    <link rel="stylesheet" href="./build/imgtor.css" />
  </head>
  <body>
    <img src="./images/domokun-big.jpg" alt="" id="e2e-save-target" />
    <script src="./build/imgtor.js"></script>
    <script>
      window.e2eSaveEditor = new imgtor('#e2e-save-target', {
        minWidth: 100,
        minHeight: 100,
        maxWidth: 600,
        maxHeight: 500,
        plugins: {
          filter: false,
          finetune: false,
          resize: false,
          frame: false,
          fill: false,
          redact: false,
          annotate: false,
          decorate: false,
          retouch: false,
          crop: false,
          history: false,
          rotate: false,
          save: {},
        },
      });
    </script>
  </body>
</html>
