# Create a GitHub Release when a version tag is pushed (e.g. v5.2.0).
# npm publish remains manual; see RELEASING.md.

name: GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          node scripts/extract-changelog-release.mjs "$TAG" > "${RUNNER_TEMP}/release_notes.md"
          echo "path=${RUNNER_TEMP}/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create or skip GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "imgtor ${TAG}" \
            --notes-file "${{ steps.notes.outputs.path }}"
